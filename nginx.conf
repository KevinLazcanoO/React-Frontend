server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Enrutado SPA: cualquier ruta desconocida (ej. /posts/1/edit) se sirve con index.html
  # para que React Router se encargue de renderizar la vista correcta.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cacheo agresivo de los assets con hash en el nombre (JS/CSS/imágenes/fuentes).
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Compresión para reducir el tamaño de transferencia.
  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;
}
